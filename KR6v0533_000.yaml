front:
  text: 鶴林寺位於江蘇丹徒黃鶴山下黃鶴山在府城西南三里一名黃鵠山俗名鴻鵠山乃京口五名山之一也鶴林寺舊名竹林晉大興四年三二一創劉宋高祖微時嘗遊焉及即位改今額稱鶴林律院唐開元天寶間七四一有玄素禪師法照者得法於牛頭山歸主其地僧徒日衆始改為禪寺又名古竹院後薛朗劉浩作亂寺燼廢宋紹興中一一三一一一六二重建改名報恩光孝禪寺咸淳間一二六五一二七四僧慶清重修明水樂中一四三一四二四寺燼廢僧得月就古竹院稍葺治弘治中一四八八一五五了心始建殿宇萬曆間一五七三郡守鍾庚陽招僧德乘居之吏部尚書陸光祖捐金重建天王殿此明萬曆以前寺之沿革也重要之建置如尚喜堂天雨寶華堂圓音堂等乃高僧講經之處為佛教之名利餘如積弩堂濂溪祠陸秀夫祠丹徒宮愛蓮池曾布宅米芾宅等亦具有歷史性之古迹鶴林寺自明萬曆間許國誠高一福增修京口三山全志以鶴林寺志一卷附之時寺僧明賢亦撰有鶴林寺志一種搜羅較前志完備然前志所收釋法永黑漆光菩薩傳明賢此志未收其高僧門之黑漆光菩薩傳則極簡略前志所收殷天祥傳此志未收人物門之殷七七傳亦極簡略前志又收法語一門此志亦未收據此可知二志雖修於同時當未曾互為依據也明賢此志不分卷略分十四門山川建置山界田土碑銘古碣高僧人物紀異記序疏文説詩碑銘古碣尤存文獻中之珍寶此志初刻於明萬曆間茲據國立中央圖書館所藏萬曆初刻本景印俾與許國誠高一福所撰志比觀焉鶴林志序劉承幹字貞一號翰怡吳興劉氏嘉業堂藏書印京口有五名山曰金焦甘露招隱鶴林豫皆信宿觴咏此中然金焦險甘露喧招隱僻獨鶴林南去縣郭無數里不風濤而有清泉不市囂而有幽梵不舟車而可以緩步可以遲歸所謂幽人之貞履道坦坦者也山中有始皇鑿道王恭飛樓劉裕藏農具於此戴顒女磨笄於此殷七七借開杜鵑於此最晚為馬素塔米襄陽伽藍與竹院蓮池耳寺中多殘碑斷碣自宋思陵以及嶽珂孫覿圓悟中峯其餘古佛大士刻像半出唐宋名手非他山所敢坐也寺茀廢垂久賴冡宰陸公郡守文一吳公玉沙王公捐俸𠛼復始還舊觀而鶴林志則闕有俟焉寺僧履中護戒能詩乃以禪誦之暇排纂志稿請裁於函伯賀公厥亦勤矣夫國乘以勸戒賢不肖而設也郡乘以因革利害而設也而寺乘則否夫名公巨人客卿以探奇弔古至其指點泉石品量松桂不至七聖迷而岐路哭者賴一二寺僧為導師耳若問之名勝不知叩之古迹不識愕焉嗒焉如頑石稿木相似使驂鸞控鶴者流取往于犢子雀兒田更谷叟之口非山負客乃僧負客也亦僧負山也而可乎履中笑曰山僧辛苦撰志豈以逞識途之馬通問津之舟蓋此志成就豪右不敢漁徒屬不敢鬻祖塔僧廬免于草莽名迹護法垂若日星侵者還仆者起皆志書一線之力也若為遊客指迷則諸公杖頭自有眼在何煩老僧饒舌萬曆甲寅中秋日眉公陳繼儒撰陳繼儒印麋公鶴林寺志目録山川建置附祠廟方丈宅舍樓臺亭橋諸遺迹山界土田碑銘附唐宋古碣高僧人物紀異附雜紀紀序説疏文賦詩
