祠堂碑記潤州之城南鶴林寺舊有陸丞相祠丞相者宋同簽書樞密院事陸公秀夫也按宋史端宗景炎二年帝次惠州甲子門公扈從行在時播越海濵事踈略公獨儼然正笏如在治朝三年帝崩公與張世傑共立衛王方八歲公外籌軍旅內調工役兄有著作皆出其手雖匆遽流離中猶日書大學章句進講崖山之圍世傑兵敗公急走帝所語帝曰德祐皇帝辱已甚陛下不可再辱乃光趣其妻子八海已躬負帝赴海死一時從者甚衆嗚呼公于君臣之分死生之際可謂明于大義矣當是時天下皆為元有崖山一片石進退無據公不顧成敗利鈍從帝於危濤巨浪之中思以一成一旅之衆光復舊物此其志有足悲者特以大義所在一線尚存不敢暫忘興復之業逮勢窮力竭計無復之然後奉帝以死國君死社稷公死國君同歸于義而已士大夫讀書明理事之成否原不可以預計惟審乎義之所在而知之明處之當不難以身殉君並不難以君殉國公此志也與日月爭光可也嵇公之先世為楚州鹽城人生三歲隨父徙家于鎮遂為鎮人焉自宋迄今六百餘載公祠在潤者俎豆不衰按公舊祠在陽彭山明正德中敕建于壽丘山為四賢祠因祠廢復遷于城南鶴林寺有司以時致祭此祠之本末也余守潤之三年郡諸生以修葺公祠來告且請文於余余因表公之大節著於史者鑱諸麗牲之石以風示郡之人亦以嘉郡人之能祠公為知義也中憲大夫知鎮江府事加三級王燕撰
