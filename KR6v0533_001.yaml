body:
  text: 廣陵藏鶴林比丘明賢詮次揚州羅聘延陵賀烺函伯訂正新項源漢字山川黃鶴山在府城西南三里一名黃鵠山俗名鴻鵠山相傳宋武帝微時采樵山中見黃鶴百群時翔時集故名京口記曰有黃鶴山在縣界晉王恭為刺史改創西南樓名萬歲樓西北名芙蓉樓俗傳此樓飛向江外以鐵鎖縻之乃已則此山之名其來已久而謂宋武帝微時游息於此有黃鶴飛舞其上而得名者或非實録也劉宋戴顒世居剡中又徙京口止黃鶴山宋文帝每思見之曰吾東游當宴戴公山下故又名戴公山磨笄山在黃鶴山東南戴顒女於山頂磨笄誓不適人故名胡𧊵嶺相傳秦始皇鑿俗名祖師岡萬松岡與祖師岡相接即竹林寺老僧手植後為刁景純葺之為藏春塢蘇軾詩白首歸來種萬松佇看千尺舞霜風即鶴林寺西菜園也龍目湖劉楨記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡為兩斷而梁典乃云武帝望京峴盤紆似龍掘其左右為龍目二湖一湖令水南注從鶴林勝果門經西菜園過道人橋入河一湖令水北注經唐頺山後至關門橋達京口港周孚詩曰平湖認龍目斷嶺記𧊵腰秦潭一名淥水潭在鶴林寺右唐陸龜蒙詩曰松門穿戴寺荷徑繞秦潭唐時開並頭蓮於潭中時賢皆有題咏俞德鄰作雙蓮詩序宋紹興間郡守鄭滋改名放生池愛蓮池宋周濂溪先生少失父奉母依舅氏鄭龍圖居潤州母卒遂葬焉夙與鶴林寺僧壽涯交善讀書於寺旁因鑿蓮池萬曆丁酉丹徒令龎公時雍於池上環以石闌雜蒔花柳松柏焉荷香池在虎踞門外西菜園中可二三頃舊有亭不存白蓮池在古竹院東谷中池上有鬥雞庵蘇軾詩云白蓮池上鬬雞庵寄奴泉泉中舊有白龜人疑其為龍種又名龍泉大旱不涸宋紹興間有僧禱雨於此獲甘霖焉逆流泉在鶴林別業白龍岡下去鴻鶴山六里水味清甘齊慶封奔吳居此所鑿珍珠泉在獸窟山北四靣高峰回岡復嶺環抱泉上上有及泉亭為李迪搆今廢蓮花洞在白龍岡逆流泉上萬曆庚戌寺僧明賢新闢洞內㟏岈奇邃幻出天巧洞前石尤奇勝鶴林寺志建置附祠廟方丈宅舍樓臺亭橋諸遺蹟鶴林寺在黃鵠山下舊名竹林晉大興四年創宋高祖微時嘗游焉及即位改今額是為律院唐開元天寶間玄素禪師法照得法于牛頭山歸主其地始改為禪寺又名古竹院後薛朗劉浩作亂寺燼廢宋紹興中重建改名報恩光孝禪寺咸淳間僧慶清重修國朝永樂中寺燼廢僧得月就古竹院稍葺治之弘治中了心始建殿宇萬曆間郡守秀水鍾公庚陽招僧德乘居之吏部尚書陸公光祖捐金復寺傍侵地重建天王殿及方丈僧寮蓮亭竹院刑科左給事前知丹徒縣事馬邦良有記古竹院唐李涉詩因過竹院逢僧話即其處也及火燼後宋蘇學士培竹蓮池上今名蘇公竹院妙喜堂唐大中六年建法師於此開演彌陀法華圓覺諸經處天雨寶華堂在古竹院前唐夾山禪師說法處圓音堂元至正間西竺僧法喜講華嚴經處積弩堂宋武帝藏萬鈞神弩處壽涯方丈在舊寺佛殿基後杜鵑臺前今為童氏占為墓陶太史石簣題曰古宿道場濂溪祠在寺之西萬曆甲申冡宰陸公光祖贖其址郡守文臺吳公建祠以和靖尹先生配祀尹開封人建炎中奉召赴紹興經鎮江夫人郭氏亡遂葬焉先生沒後子孫家于丹徒陸秀夫祠在寺之東竹院中米元章護伽藍神祠張王廟舊名廣德王廟相傳即唐開元間馬師所叱之神祠也在鶴林寺門外宋崇寧間新葺為建炎兵火所壞元至大間重修萬曆間寺僧明賢使其徒守祠丹徒宮宋武帝故宅微時躬耕于此及受命貯農器以示後人竹林精舍在黃鶴山北林澗甚美戴顒嘗憩于此其趾今廢郗鑒宅在鶴林門外唐頺山南刁協宅在黃鶴山西曾布宅在千石墟東米芾宅在鶴林寺養老堂後鴻鶴山下元章因廬父光輔墓建手書城市山林四字此額為米友石取去萬歲樓在戴公山北嶺上即古月觀也至唐猶存千巖樓在南嶺上唐刺史王璠造紹興間郡守劉岑葺而新之光風霽月亭在濂溪祠前萬曆丁酉郡守王公建竹間亭萬曆己亥歲建在竹院中陸秀夫祠後浮花亭張子顏所居歐陽永叔詩有水浮花片出人間之句南山亭在放生池上宋紹興間郡守鄭滋建後廢嘉定間郡守趙善湘復立今亦廢荷香亭在荷香池上萬曆間寺僧明愚重建杜鵑臺唐貞元中有外國僧自天台鉢盂中以藥養根種之每春月花開見二女子遊于花下後收歸閬苑臺址尚存升仙橋或謂緋衣杜鵑花神自橋騰空云馬玄素禪師塔在舊寺杜鵑臺後有李唐左補闕李撰塔銘米光輔墓米元章墓俱在黃鶴山下宋僧慶清跋曰黃鶴山下舊有米元章墓碑稱禮部郎中米芾父左武衛將軍贈中散大夫母丹陽縣太君閻氏皆葬于此中書舍人蔡肇為之銘鶴林寺志山界東至鴻鶴坊天福山菊花山南至石人橋獸窟山峴山黃山西至龍目湖黃蜂嶺北至唐塠山鶴林門鶴林寺志田土欽賜鶴林田土原額官民田地二拾捌頃二拾柒畝伍分五厘五毫官田地肆頃一畝陸分捌厘柒毫民田地二拾肆頃二拾伍畝捌分陸厘捌毫無徵虛額坍江官民田地一拾一頃柒拾叄畝捌分捌厘玖毫官田一頃二拾一畝伍分陸厘二毫官地一頃二拾畝二分伍厘肆毫民田陸頃叄拾肆畝參分陸毫民地二頃玖拾柒畝柒分陸厘柒毫今量有徵官民田土一拾陸頃伍拾二畝柒分二厘陸毫官田伍拾叄畝柒厘伍毫官地一頃伍畝捌分伍厘陸毫成熟地玖拾肆畝捌分二厘玖毫荒白地一拾一畝二厘柒毫民田地一拾肆頃玖拾叄畝柒分玖厘伍毫減勸田地一拾肆頃捌拾叄畝二分叄厘陸毫全勸田地一拾畝伍分伍厘玖毫田捌頃陸拾叄畝伍分二厘叄毫地陸頃叄畝二分柒厘二毫成熟地伍頃二拾一畝柒分肆厘捌毫荒白地一頃捌畝伍分二厘肆毫官民山塘二拾柒頃肆拾陸畝伍分柒厘一毫官山伍頃玖拾陸畝捌分捌毫民山二拾頃柒拾捌畝二分柒厘陸毫民塘柒拾二畝肆分二厘柒毫本運以上官民田土肆拾肆頃二分叄厘柒毫原額官民田地伍拾肆頃二拾玖畝柒分陸厘肆毫官田地玖頃二拾肆畝肆厘陸毫民田地肆拾伍頃伍畝柒分一厘捌毫無徵坍江虛額官民田地一拾一頃陸拾畝柒分捌厘叄毫官田一頃一拾玖畝叄分捌厘肆毫一則坍江田一頃陸畝肆分二厘捌毫一則虛額田伍畝叄分陸厘二毫一則虛額田伍畝二分一厘玖毫一則虛額田二畝叄分柒厘伍毫官地一頃一拾柒畝一分玖厘一則坍江地捌拾一畝肆分伍厘一則坍江地二拾叄畝陸分伍厘一毫一則坍江地肆畝肆厘叄毫一則虛額地陸畝一則虛額地一分二厘一毫一則虛額地一畝玖分柒厘民田陸頃叄拾伍畝陸分陸毫一則坍江民田伍頃捌拾一畝叄分陸厘伍毫一則虛額民田肆拾柒畝肆分叄厘一則虛額田陸畝捌分一厘一毫民地二頃捌拾捌畝陸分叄毫一則虛額地二頃捌拾捌畝玖厘叄毫一則虛額地伍分一厘今量有徵官民田地一拾伍頃捌拾叄畝捌分陸厘肆毫以上共捌百陸拾陸丘官田地一頃畝陸分二厘捌毫共柒拾二丘成熟官田叄拾柒畝一分玖厘共拾肆丘今現存田一頃肆拾肆畝二分肆厘地柒拾一畝捌分柒厘玖毫荒白地伍拾伍畝捌分山五頃一拾陸畝肆分玖厘捌毫新增濂溪先生祠籍沒膳田一百零叄畝鶴林寺志碑銘唐潤州鶴林寺開山大津法照馬素禪師塔銘并序唐左補闕李撰道行無跡妙極無像謂躰性空而本源清淨謂諸見滅而覺照圓明我天人師示第一義師無可說之法義為不二之門其定也風輪駐機其慧也日宮開照其用也春泉利物三者偹體誰後誰先入無量而不動開法而踴出湛兮以有無觀聽而莫測寥兮以遠近思惟而不窮智得皆空為真實際大悲恆寂遍撫群迷月入百川之中佛匝千之上修而證者玄同妙有應而起者旁作化身先大師適來此土化身歟適去他方補處歟不可得而知也自如來現滅四魔橫恣人天無怙寄命崩崖勝大敵者那羅延身消大毒者伽陀妙藥拔陷扶墜而生大師大師延陵馬氏諱玄素字道清崇高紹興於法外徑不繫於人間慈母方娠厭患葷肉長至一日誕彌仁尊生有異祥乳育安靜既齔稽首父母求歸法門即日獲請出依精舍如意年中剃度𥛬江寧長壽寺既進具已戒光還照定水澄源鵝王之不受泥塵香象之頓除羈鎖未之比也身長七尺躰無凡骨眉毫際臉口若方丹目不顧睇聲侔扣玉入南牛頭山事威大師撞鍾大鳴入海同味迦葉以頭陀第一大師亦抖藪塵勞聞一知十未嘗請益觀法無本觀心不生喻金剛之最堅比師子之無畏圓月照海高深盡明惠風吹雲宇宙皆淨威大師摩頂謂曰東南正法待汝興行命于別位開導來學于是騶虞馴擾表仁之至也衆禽獻果明化之均也接足右繞百千人俱大師悉以菩薩呼之教習大乘戒妄調伏自性還源無漸而可隨無頓而可入摩尼照物一切如之吾常默然無法可說或有信願䨥極懇求心要于我渴仰施汝醍醐問禪定耶吾無修問智慧耶吾無得道惟心證不在言通壞帝釋輪終為世論自淨而已無求色聲既悟者小無微塵大無三界當悟者內珠雖隱猶作來因藥草萬殊根莖等潤貌和言寡饑至飽歸或有聞尊稱而遷善見色身而獨得我無爾念道溥慈圓食不問鹹酸口不言寒暑身同池水飽蛟蚋之飢渴道離人我順衆生之往來䝿賤冤親是法平等故饋甘味而不辭同乎糗糒奉上服而不拒齊于斃褐俾夫家有道侶府無爭人開元中本寺僧法密請至京口潤州刺史韋銑灑掃鶴林茲焉供養有屠者恣忍積骸如山聞大師尊名來仰真範忽自感悟懺悔求哀大師受之又白言和尚大悲當應我供大師衲衣跏趺未嘗出戶公侯稽首不為動搖至是如其懇乞欣然降詣夫盜隱其罪虎慈其子仁與不仁皆同物性不生不滅無去無來今濁流一澄清水立現諸佛所度我亦度之天寶中揚州僧希玄密請至廣陵便風馳帆白灮引道楚人相慶佛日渡江梁宋齊魯傾都來會津塞途盈人無立位解衣投施積若丘陵皆委于所在行無住舍禮部尚書李燈時為揚州牧齊心跪謁為衆唱首望慈月者誰不清凉傳百億明燈照四維上下塵沙之數皆趨佛乘二州以貪法之心移牒逾月均吾喜捨成汝堅牢無非道場還至本處天寶十一載十一月十一日中夜坐滅嗚呼菩提位中六十一夏父母之生八十五年赴哀位者可思量否有至浮江而奠望寺而哭十里花雨四天香雲幡幢蓋網光蔽日月以其月二十四衆等號捧金身建塔于黃鶴山西原像法也州伯邑宰執喪師之禮率申哀慕江湖震悼曩于寺內移居高松互偃涅槃之夕椅桐雙枯虎狼哀號聲破山谷神祗惜動天地晦冥及發引登原風雨如掃慈鳥覆野靈鶴徊翔有情無情德至皆感初達摩祖師傳法三世智信大師信門人達者融大師居牛頭山得自然智信大師就而證之且曰七佛教戒諸三昧門語有差別義無差別群生根器各各不同惟最上乘攝而歸一凉風既至百實皆成汝能總持吾亦能隨喜由無上覺路分為此宗融大師講法則金蓮冬敷頓錫而靈泉湧溢東九西域得神足者赴會聽焉融授巗大師巗授方大師方授持大師持授威大師凡七世矣真乘妙緣靈祥嘉應僉具傳録布于人世門人法鏡吳中上首是也門人法欽徑山長老是也觀音普門文殊佛性惟二菩薩重灮道源門人法勵法海親奉微言感延霜露繕崇龕座開構軒楹時惟海公求報師訓廬孔氏之墓起淨明之塔世異人同法然長慕僧端等蔭旃檀樹皆得身香菩薩戒弟子故吏部侍郎齊浣故刑部尚書張均故江東採訪使潤州刺史劉日正故廣州都督梁升卿故採訪使潤州剌史徐嶠故採訪使常州刺史劉同升故潤州刺史韋照理故給事中韓賞故御史中丞李丹故涇陽令萬齊融禮部員外郎崔令欽道流人望莫此于盛弟子嘗聞道于徑山猶樂正子春之于孟子也洗心瞻仰天漢彌高鏡公門人得甚深者大理評事楊詣過去聖賢諸功德藏志之所至無不聞知魯史從告况乎傳信其文曰濁金清鏡在爾銷鍊磨之瑩之功至乃見膏漬炷然灮明外遍陽升律應草木皆變啓迪瘖瞽惟吾大師息言成教捨法興悲辰極不動風波自移境由心寂道與人隨杳然玄默湛入無餘性本非垢云何淨除身心宴寂大極淪胥內光無盡萬境同如甘露正味琉璃妙品遍施大千無同無異度未度者化周緣備道樹忽枯涅槃時至我無生滅隨世因緣吉祥殿上應化諸天寂寂靈塔滔滔逝川恆沙不壞智月常圓道以人著人以道尊舍道求人何有凡智大津法照禪師唐有道之高僧也事迹載于傳燈鶴林舊為律院師因住焉後奉師像于室示不忘初之義歲歷悠久慶清領事始為師前覩其像服弗完撓棟弊陋喟然嘆曰祖師乃道之尊優曇花枝葉榮茂人而可忘本乎况師道德照世千古不泯遺像昏蒙若是即日巾工裝飾一新金碧輝髹漆崇麗舊獲唐李公撰師塔銘有序無銘且傳寫失真魯魚有異一日本山居士出家藏本而訂正改易舛訛增銘鋟梓龕置壁間以衍其傳慶清三復碑銘有云濁金清鏡則知清鏡二字前哲語機默合符契清名鏡號撰述于五百年前讖應于五百年後慶清來此周旋師之香火發揚師之道德豈偶然哉又聞耆老相傳謂米元章御史銀青公自襄峴來居京口時過鶴林聽法于𦖟禪師屢言我于鶴林有緣歿後當為護法至捐館日忽寺之伽藍神仆于殿下師曰米公顯靈來護法乎乃肖像而祠之今伽藍神是也歷數世而莫有傳者慶清因表揭以彰神迹故可以併書俾後之有考云爾咸淳庚午歲七月既望住山古鏡慶清跋余昔檢唐人著述見李氏所撰法照禪師塔銘愛其文辭雋麗詣達名理手之不能釋萬曆己卯冬歸自京師道潤州與鄉進士錢君與映散步過鶴林寺則李公撰銘在焉板刻于宋咸淳間錢君懼其久而刓也願鐫之石周覽廡間有宋高宗御書及蘇子瞻嶽武穆與國朝楊少師石淙公諸刻具在寺之左為竹院唐李涉詩因過竹院逢僧話即其處也右為周濂溪先生所鑿蓮池近歲並侵沒于民家蹟幾泯時吾郡鍾公庚陽守是邦稍復竹院之故址越六年甲申豫再過寺而太守臨川吳公撝謙觴豫于此顧瞻唐宋名賢往蹟慨然思振之於是右方蓮池并寺前侵地則又次苐盡復而錢進士斷石適成蓋至是而千載名剎古今高賢勝躅實賴二公而表著焉因述其事授主僧德乘并鎸于石是年正月五日吏部右侍郎浙平湖陸光祖識米元章墓志銘蔡肇崇寧三年甲子六月制詔今四方承平百揆時叙小大之政畢舉增光繼志曠古絶無獨書畫之學未有高世絶人之風殆勸勵之不至也其議投試簡拔之法著為律命建官養徒庶幾異時彬彬者有紀焉於是六藝之學以次開設矣是時元章名能書適官太常一旦奉詔以黃庭小楷作千文以獻繼進所藏法書名畫賜白金緡錢甚腆方民間競以前代筆蹟來上萃於祕府號宣和御覽幾百帙特詔丞相太史楚國公跋尾公亦跋旨預觀縉紳以為榮遇已而出知常州不遠改勾管洞霄宮未幾就除知無為軍踰年𣸪召為書畫學博士便殿賜對詢落逮因上其子友仁所作楚江清曉圖既退賜御書畫扇各二遂擢為禮部員外郎復以言者罷知淮陽軍彌年瘍生其首上書謝事不許以某年月日卒於郡廨享年五十有七遺命送終皆有治命賻其家以百縑不受官其子皆特恩也公諱芾字元章世居太原後襄陽自其高曾以上多以武幹官顯父光輔始親儒嗜學公生秀頴六歲日讀律詩百首一再過目輒背誦稍長博記洽聞於書務通大略不喜從科舉學議論斷以己意其說踔厲世儒不能屈也刻意文祠不剽襲前人語經奇蹈險要必己出以崖絶魁壘為工作字遒徑更沈著雅有晉唐風流尤善臨摹至能亂真其畫山水人物自成一家尺縑寸楮人以為玩四方碑榜咨請踵至所著詩文凡百卷號山林集宣己子聖度録正韻雜說又數十卷平居退然若不能事事至官下則率職不苟喜為教戒吏民初為煩已而安之時亦越法縱舍有足大者家故饒財既仕悉以分族人後貧不以為悔遇古書名畫必極力購取得之乃已余昔相遇於都城敗屋僦居客至烹飲出諸奇相與把玩嘯詠終日所至喜覽山川擇其勝處立字製名後來莫之廢也過潤愛其江山遂定居焉作菴城東號海嶽日詠哦其間為吾州佳絶之觀平生與游多天下士蜀劉涇長安薛紹彭好奇尚古相與為忘形交風神蕭散是其一流人也舉止頡頑不能與世俯仰故仕數困躓冠服用唐人規制所至人聚觀之性好潔置水其傍數頮而不帨未嘗與人同器服視眉宇軒然進趨襜如音吐鴻暢雖不識者亦知為米元章也少與禪人摩詰游詰以為得法其逝不但作偈語有倫父佐左武將軍贈中散大夫母閻氏贈丹陽縣太君既卒始葬潤州黃鶴山以中散祔初宣仁聖烈皇后在藩與丹陽君有舊故公少長邸中以后恩入仕初補祕書省校書郎授含光尉七遷入淮南幕改宣德郎知丘雍丘縣乞監中嶽廟授漣水軍使除發運司勾當公事蔡河撥發入奉常為博士三加勳服五品娶許氏封寧公縣君有賢行五男長則友仁也補將仕郎辭藝能世其家餘早卒八女子適進士喬襄公僖老南康君教授假拂承奉郎吳激餘未嫁孫男女各一人以大觀三年六月某日葬丹徒長山下余元豐初謁荊國王文公於金陵公以詩文贄見文公於人材少所許可摘取佳句書之便靣余由是始識公故為之銘曰米胄楚出自鬻分仍世勇爵史載芬既極而遷稟不群生憐野鴩憎家鵾掉棄韝决習典墳君才弱冠藝且文豪氣激越蕩乾坤劇談四座寂不喧冠巾說製傍朝掀浣衣濯帶肌廖皸手扳拉頰送飛雲邈晉千載風流存鍾王已往楷法紛後生不復窺完渾臨池幾年墨練裙句法甫白相弟昆造雄設險驚刓昏文成揮掃千兔髠蛟蚓著𥿄尾角騫尺牘藏去珍瑤琨一官骯髒諸侯門熟視試一引手援南宮坐曹席未溫世間巧語空織文澒淮出守朱兩轓三仕三已無戚欣視身蚊蚋何足論思坐海嶽窮朝曛暮年消中病文園踰月止酒不茹葷却乘泠風反衆薰西山嶒崚星可捫其陰大江鬱東奔嘖沙發石漂無垠氣象歷落宜置君欲酌中𤃩採芳蓀生芻舍奠宿草根尚書局促駒伏轅追摘往實詔九原吾文坐荒失鋤藝為歌銘詩下招魂巫咸上天誰復聞薄暮雷電歸呌閽駛雨忽作九河翻鶴林十三松銘皇明丁同偓佺之化徂徠肓千年菩提水澤沃日月降祥麗而或霹靂憤裂怪不俗受命土壤正也獨數以紀閏分象屬墨氏不守樵氏讀疇其惜者今柱國割廩奚異解驂贖爰景墜寺巢橋木高蔭日出青原陸止我遊人倚我穀屏息既幻玄龜伏摩庠莫變青牛觸后千百祀野史録聞者起敬見者肅咸曰太傅式多福試銘盤石垂無斁明鶴林寺一宗禪師塔銘并序師法名德乘一宗其別號廣陵房氏子也母高氏夢飛光墮室而孕年三十東家以姦事誣之師兩斷其陰以自明遂走昭陽禮太虛道極和尚和尚曰禮我何為曰世緣有盡佛法難聞念求出家耳和尚大異之鳴鍾告衆為剃髮焉執巾瓶侍左右三年一日辭往四方參學遍遊天台南海少室五臺與五臺大千師機語契合已而南還渡江居姑蘇天平山白雲禪寺三年又居金山大徹堂飯僧郡守秀水鍾公聞師道行請住鶴林古剎廢十餘年矣余適過之乃𦔳師力為規復重搆佛殿太守臨川吳公復捐俸修飭焉右蓮池左竹院前後梵宇煥然復新工將告成延麓亭法師講楞嚴經於是土人有訟師者師勿辨竟趨徑山結茆椽以居越三載士夫暨其徒衆仰師法利懇請歸山萬曆十七年秋染微疾至十二月五日合掌語衆云今日有二人求見莫令入吾室老僧今日無暇矣少頃果二人至止之不入跪俟於門外忽聞師歌曰泥牛才出海木馬又嘶風欲解箇中語山重水又重歌罷端坐而化塔于寺左山麓世壽六十三僧臘三十二銘曰惟師稟靈異夙具出世因往業亦須酬魔境時荊榛戒體苟不毀幼身何足憐由茲脫塵網佛種從緣生參方勵苦行利養施慈雲巍巍古名剎既隳賴鼎新坐脫預知時留偈度有情末教振一時超然等應真白骨埋青山歷劫弘法輪萬曆壬辰年臘月朔吏部尚書平湖陸光祖撰古碣宋高宗宸翰碑七通不見佛身知是佛若實知有別無佛智者能知罪性空坦然不懼於生死拘那舍摩尼佛身從無相中受生猶如幻出諸形像幻人心識本來無罪福皆空無所住毗婆尸佛起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性尸棄佛假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅毗舍浮佛見身無實是佛身了心如幻是佛了了得身心本性空斯人與佛何殊別拘留孫佛一切衆生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福迦業佛法本法無法無法法亦法今付無法時法法何曾法釋迦牟尼佛觀音碑行深般若妙智力普觀自在濟含識五眼圜明無罣礙六通慈誓示千億瞻之仰之福勝比情與非情俱獲益稽首水月觀世音感應難思剎塵迹古徐鶴林假坣比丘如瑤米元章斷碑紀曾遊流玉淺沙墻影賖米友仁書當山護伽藍神御史銀青米公之位東坡先生斷碑存游招隱鶴林數字斷碑竹院無人到雲屏盡日關墻頭栖鶴樹屋外磨笄山落蕊秋容淨鳴鑣祖韻次總卿氷壼先生高韻道主古鏡堂頭禪師聊資棒誦誕祖首斷碑勸農之次日和方及時膏雨汝梅敬和景定五僧法心跋碑柳子玉見和因以送之并寄其兄子璋道人一首碑忘姓名見蘇子瞻集中斷碑慶元元年秋簡池劉光祖書呈鶴林宗山長老竹院過僧話半年來往屢合送人行斷碑慶元庚申春閏二月三日豫因得月明所三字山西趙逄書通魯彥天子文游偕群從者乙亥正月二十二日錢唐俞烈斷碑鎮江府濂溪先生書堂記斷碑元冬過古竹院訪鶴林舊寺東雀相呼修竹依然因讀左史舍人壁間敬次其韻后題判府殿探中書嘗賡左史舍人留題珠玉交映有光竹院併刓于石以永其傳嘉定改元冬住鎮江府妙題斷碑春晚視賑題云長臺坐問首示府判奏院諸文舊作屬余和之勉用韻塞責冀發一笑斷碑題右竹院僧房嘉定甲申八月草一日鄂國嶽珂肅之景定甲子永嘉陳均跋云奉使總領大卿碩德弘才輝映當世膺重寄平一道政成暇日玉節儼臨山色水光為之改觀留詠詩章清深雄麗有愛君報國之志筆力遒徑凌跨前輩雖坡谷之賢未之方駕跋鎝翠琰庶百千年之下知江左道德文章忠孝未泯嘉定甲申閏八月初八日住山慧曦刻石斷碑咸淳春龍圖閣學士朝殿大夫提舉江判太平觀毛友行相乃尤雪陽春越俎之談非待價見機隨絲須飛錫臨應望雲而止碑西湖然禪師云釋氏所以久長者止以能作善言警悟不肖今觀圓悟禪師遺墨字字真率讀之森然加敬但患有不能終身行之者爾紹興癸五穀雨日章駉仲駿書斷碑瀹虎斑紹定改元二月既望判府節制寶謨太卿民平易遵令歡耕稅駕間寄興言外不獨古竹增賁農父得醉老僧得閒皆其賜也敢不刊諸石住鶴林山僧慧曦謹書金剛經碑一座心經塔一座額天雨寶晉索靖書宋咸淳間趙溍重立額古竹院古篆書額城市山林米元章書米仲詔工部取去額鎮江府濂溪書堂記米元章自寫護法小像米友仁贊一殘碑趙丹徒移去甘露寺海嶽菴鶴林寺志高僧開山馬素禪師延陵人姓馬氏諱法照字道清初剃度于江寧長壽寺後入牛頭山事威大師遂悟性宗開元中僧法密請至京口遂住一日有屠者禮謁願就所居辨供師欣然而往衆皆見訝師曰佛性平等賢愚不一但可度者吾即度之何差別之有僧問如何是西來意師曰會即不會疑即不疑又曰不會不疑底不疑不會底有僧敲門師問是什麼人僧云是僧師云非但是僧佛來亦不著僧云為什麼不著師云無汝棲泊處又馬祖遣人送書與國一欽禪師書中作一圓相國一發緘遂于圓相中著一點封回後忠國師聞乃云欽師猶被馬師惑黑漆光菩薩諱法明示蹟于萊州即墨縣𠛼溝村以試經得度于郡之崇福寺精練法每游州邑聚落間遇有胎孕婦往過其門或為講藥草喻品其娠即輕免求嗣者即果遂他郡有木客為風濤所敗即示以觀世音菩薩號俾其急誦遂獲安濟後值歲旱民庶籲禱不應乃以積薪為窣堵遂捐身入化火方焚隨大霔三日雨足開霽衆奔聚觀尚餘真身危坐灰燼曾無少損但益以光明如黑漆宋州牧以開賜號黑漆光菩薩國一欽禪師剃度於鶴林寺云素禪師語之曰此非汝所乘流而行遇徑則止后為徑山苐一代祖唐建法師於大中六年開演法圓覺彌陀諸經于妙喜堂唐夾山禪師說法于鶴林之天雨寶堂宋壽涯禪師與胡武平周茂叔交善茂叔尤依壽涯讀書寺中每師事之盡得其傳焉其後二程之學本于茂叔皆淵源于壽涯云宋御史銀青米元章自襄峴來居京口時過鶴林聼法于聰禪師謂師曰我于鶴林有緣沒後當為護法宋慶清師咸淳間重刻李塔銘元西竺僧法喜至正間講嚴經于寺之圓音堂一宗禪師諱德乘廣陵房氏子年三十東家以奸事誣之師斷其陽以日明遂去昭陽禮太虗道極和尚後參學四方遍游天台南海少室五臺已而南渡江居姑蘇太平山白雲寺三年又居金山大徹堂飯僧郡守秀水鍾公請住鶴林規復千餘年已廢之古剎法堂香積重見光明萬曆十七年冬師合掌語衆曰今日有二人求見莫令入吾室老僧今日無暇矣少頃果二人至止之不入跪俟於門外忽聞詩歌曰泥牛才出海木馬又嘶風欲解箇中語山重水又重歌罷端坐而化明達觀禪師萬曆間過鶴林慨然懷興復之志有吊鶴林寺松詩及與諸宰官書鶴林寺志人物宋武帝微時嘗棲于山下時鴻鶴百群張翼蔽日又鑿泉為寄奴泉後即位署故宅為丹徒宮戴顒字仲若樵郡銍人也父逵兄勃並隱遁有高名逵善琴書顒並傳之會稽剡縣多名山故世居剡下後又居桐廬山中衡陽王義季鎮京口長史張邵與顒姻通𨒖來止黃鵠山山北有竹林精舍林澗甚美顒憩于此澗義季亟從之游顒服其野服不改常度為義季鼓琴並新聲變曲其三調游絃廣陵止息之流皆與世異太祖每欲見之常謂黃門侍郎張敷曰吾東巡之日當宴戴公山也自漢世始有佛像形制未工逵特善其事顒亦參焉宋世子鑄丈六銅像于瓦官寺既成靣恨瘦工人不能治乃𨒖顒看之顒曰非靣瘦乃臂脾肥耳既錯減臂脾瘦患即除無不嘆服刁協嘗卜居于黃鶴山西殷七七名天祥又名道筌嘗於九日開杜鵑花李涉有竹院逢僧詩竹院之名因此浸著曾布卜居鶴林寺外千石墟布詩有云家住城南千石墟周敦頤與寺僧壽涯禪師交嘗讀書寺中鑿池蒔蓮蘇軾嘗游鶴林有詩刻石又竹院蕪廢為培竹于蓮池之上米芾字元章父佐由襄陽徙居丹徒後葬黃鶴山芾因築室守墓襄陽志林稱元章愛鶴林松石沉秀誓以來生為寺伽藍永護名勝後果還宿願於此壬酉發字噩甫安豐人父沔宋端平中徙居丹徒酉發登寶祐癸丑進士歷金壇荊山兩縣丞遷知靜海縣入元不仕隱居鶴林自號息寮子楊遵為郡守以夢感遷玄素師塔于玄武麓嶽珂嘗游寺中有詩刻于石鶴林寺志紀異晉王恭建萬歲樓有僧自西域來指其地謂曰百年後當有異僧駐此說法後果有素禪師據此說法聽者千餘人說罷衆退惟縞衣百人侍立不去師詰曰衆退汝延立謂何應曰我等仗師聖法各脫縞衣矣遂謝師翔空而去因名鶴林晉義熙中潤州山中多虎患刺史王恭令鄉社俱立廟禳災而虎患終不息恭聞東林遠公高弟法安禪師有戒德懇請入山安一日臨暮獨入戴公山古樹下通夜禪誦侵曉群虎跳躍來安左右安為說法授戒虎踞伏不敢動有頃皆去虎患遂息恭因建寺奉安像安指其地曰此處代有異人住此說法相傳古鶴林有銀杏樹大數十圍即法安於此伏虎之樹也至萬曆五年廢于土人潘姓者豫考招隱山舊稱虎窟山然鶴林稱戴公山而招隱亦戴顒所居今黃鶴山去招隱尚距三四里豈當時只園精舍固連亘兩山耶開元間素禪師登座說法四衆雲集有頃霞光燭天林鶴翔舞忽寶花彌空而下紛繞法座大衆莫辨為何花師曰此天花也鶴林杜鵑高丈餘春月花開傾城游賞相傳唐貞元中有外國僧自天台鉢盂中以藥養根種之每春末開時或窺二女子來游花下俗傳花神也其後有殷七七者名天祥又名道筌周寶于長安中識之及寶自涇原移鎮浙西七七亦到郡寶師敬益甚一日謂七七曰鶴林之花天下奇絶嘗聞子能開非時花今重九將近能開此乎七七曰乃可前二日往花所其夜女子來曰妾為上帝司此花今與道者開之然此花不久當歸閬苑矣晨起花漸破蕊九日盛開如春寶驚異燕賀纍日數日後花俄不見亦復無落花在地後二十年薛明劉浩亂寶南奔杭州而寶總戍為政刑殺無辜前上饒牧陳全裕經其境搆之以禍盡赤其族寶八十三筋力猶北女妓數百盡得七七之術及全裕作厲一旦忽殂七七劉浩軍變之時甘露寺衆推落北崖謂墜江死矣其後人見在江西十餘年賣藥入蜀莫知所之鶴林犯兵火焚寺樹失根株信歸閬死矣按樂天東坡詩注并容齊隨筆皆云山石榴映山紅山躑躅即此花也宋咸淳八年寺僧慶清乃以躑躅補其舊迪功郎光州司戶參軍朱正國作紀刻石未幾枯瘁元延祐丙辰里人戈道恭家圃有此花乃移植故處蜀郡青陽翼為記容齊隨筆云鶴林寺杜鵑乃今映山紅又名紅躑躅在江東彌山亘野殆與榛莽相似而鶴林之花至以為外國僧鉢盂中所移上命玉女司之已踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宮詞大儀前日緩方來囑向昭陽乞藥栽敕賜一窠紅躑躅謝恩未了奏花開如此則宮禁亦鮮之矣唐開元天寶間玄素禪師主寺寺前曰祖師岡岡外伽藍護譴師叱之已米元章父子與寺僧禪師交契元章每謂曰我必護法此中師曰無戲言元章曰我死之日寺中鍾鼓自鳴即神來矣將化語子曰鶴林緣熟我神將棲之死之日伽藍神忽仆地下咸謂元章代玄素所叱也者梵樂亦皆自響如其言其子米友仁手書當山護伽藍神御史銀青米公神位又云米光輔自襄陽峴山來居京口游南山入竹林憩杜鵑臺下偶見黃鶴𡶶頭一老比丘手執白拂青藤扶雲而下呼光輔曰公今日始來耶老僧待汝久矣公愕然相向遂呼童命酒上老僧僧曰五百大戒酒為尊貧僧自幼不沾脣接了大人一杯酒伽藍依舊進山門又讖曰坐黃鶴靣北固得文石為葬地語畢遂往隨尋法師發願曰我與鶴林有緣沒後當為護法後某年月日無病而逝遂為寺中伽藍元章扶其柩葬養老堂後果得文石一方云二說不知孰是宋僧別𡶶印禪師住金山入定游龍宮龍王謂師曰寺每推輪藏吾宮為之震動請去之僧許諾覺而語其徒咸莫之信也僧乃探袖中龍鬚巾示之遂將輪藏移來鶴林寺元祐中僧了元與米元章蘇東坡宿鶴林深夜見紅光兩道起于萬佛閣前達曙方滅因搆兩藏殿于大雄殿之後晦堂有記曰龍宮海藏五千卷定裏移來置鶴林至今僅存殘經百卷而已鶴林厨下有一行人無姓氏不知從何來萬曆初年可五六十歲見人微笑作顛語問之則不復言掉臂而去嘗卧灶下執爨汲水禮佛念佛食殘飰補破衣捫虱閒則撫掌大笑覩其形若垢即之香潔無穢氣日日浴池中冬月大小便後必往池邊敲氷洗滌數次乃止雲間陳眉公異其人一日舉手摘野菜一把與陳日彀了又問其年答曰有何年歲眉公謂寺僧履中曰此必異人也陸秀夫祠舊在金山後移唐塠山萬曆二十五年元旦昧時豫夢見一人幞頭絳袍來鶴林方丈豫曰公何人耶公曰我乃陸秀夫師是我主人遂拜拜訖不見覺而異之即往唐塠山陸公祠中肅拜見廡下有斷碣乃少師楊文襄奉勑撰陸公祠碑記也數日後命工人塌得碑記三紙歸藏篋中無何祠遂崩圮碑亦不存至二十八年郡守許公國誠遷陸公神主來寺中命僧司之始知陸公已於三年前神先來此矣寺僧履中識韓無咎云鶴林招隱皆京口勝處也余頃遊焉鶴林近城猶屋數間招隱逈在山中屋亦無矣况修林哉東坡所謂古寺滿修竹也惜其未深者殆鶴林耶周寶為浙西節度使治城隍至鶴林門得古冢棺櫝將腐發之有一女子靣如生鉛紛衣服皆不敗寶即命改葬具車輿聲樂以送與僚蜀登城隍望之有紫雲覆輛車上行數里見一女子出自車中坐于紫雲冉冉而上久之乃沒啓棺則空矣附雜紀米元章好奇怪當平世葬其親潤州山間不封不樹嘗自詫於人言莫有知其穴者有王相者子韶之子也素與米遊甚狎獨知之米一日與客遊山因至墓所周覽之次相忽溲於草間米色變意甚怒然業已諱之竟不敢止相宋時有數貴人遇休沐擕歌舞僧舍者酒酣誦李涉題鶴林寺詩終日昏昏句僧聞而笑曰尊官得半日閒老僧却忙三日謂一日供帳一日燕集一日掃除也孫覿啓族孫書言云公住鶴林矣鶴林寺杜鵑花收還閬苑數百年後鍾鼓一新雲山改色自公始也又啓上山老云每記浮杯卓錫之嘲想見故人風度聊以自慰也釋達觀與金壇王損菴于中甫書鶴林黑漆光之再照于世也實大檀那護法深心并二公委曲𦔳成之耳若少不耐煩則此光之偏照未可幸也由是言之二公苟非任貫高田光之願力安能遂志故師子捉物遇香象即奮全力設遇狐兔亦不敢不奮全力也此在梅村居士或敗之無辱矣惟二先生此為護法之始敗則非夫也且寺僧幸有履中主持之貧道不敢候行軒矣惟慎圖之釋永堅與履中書時境中見天上飛一染色僧梨飄飄冉冉掛禪兄法體諗知禪兄戒德夙因矣今遊京口志在尋師豈有饑逢王膳而不餐者耶待瑜伽論完挾唯識過訪且求指示將訂終身之約不獨以結冬之故也公堯封與鶴林履中上人書上元前得南海僧寄到手札鶴林上人信士哉幾年相託千里不忘足徵素養惟是委曲踐言不無煩瑣有勞行者緬惟蓮池竹院猶存當年境色萬一否其祠田果為強有力者侵沒院道申文炳如日星當事者自是愛禮存羊何勞過慮若與之校反多一番擾攘靜聼為當昔日曾許我山東之遊乃竟靣壁深藏令人不得覩靣真是自了漢哉觀公筆法文義似有老像內養靜工豈強弩之末稍稍徑力少耳收功全在此時百尺竿頭當更進為佳鶴林寺志記吳興劉氏嘉業堂藏書印鶴林寺興復記潤江山稱寓內甲觀中流角立金焦而北固翼然臨其渚迤南則崇岡叠翠懸壁插空諸名山唯是黃鶴磨笄最勝磨笄之亥黃鶴之陽隱古剎其中曰鶴林鶴林創晉大興間原額竹林以宋武帝舊遊也賜田山萬計而更今名迄唐馬祖玄素師主之為禪寺因有古竹院李涉詩因過竹院逢僧話即其處也環寺前一岡師經出入人題曰祖師岡岡外神祠舊傳護伽藍神也獲譴師叱之寺中杜鵑花枝凡九叠異僧從天台置鉢中移來每春時盛開芳香凝藹倣佛二仙女出其旁疑為花神自後花歸閬死而寺𥨊凌夷衰微也則數存焉矣宋興香火復振高宗賜名報恩光孝禪寺製御書七通石刻郡守楊遵以夢感遷其師靈塔于寺玄武麓今遺蹟兀然周濂溪先生鑿蓮池寺右而東坡公復培竹蓮池上號東坡竹院南宮米氏自襄峴來時過聰禪師曰我于鶴林有緣歿當護法至今有米元章祠人咸謂代昔玄素師所嘗叱也者理或然也寺題咏甚夥靡得緌述如李白朱放皇甫曾李涉綦母潛東坡嶽武穆諸什托入郡志者尤推炙美入國朝寺基改為瑩墓僧得月者恢古竹院存遺弘治中了心重建奉龍象一新郡少師石淙楊公愛寺前松十三株挺秀時來盤桓其下于是搆十三松賦記銘重之亡何兵興賦冗僧衆苦徭役不支逃亡略盡而寺坐廢併向所為十三松者且不免繼焦桐爨矣夫當其盛也一卉蒙神一木入品及其衰也景物隨移山林改色寰宇興亡大較若是矧區區一鶴林乎蓋至萬曆改元而登其墟殆不勝悽愴焉棟宇傾欹像顏頺剝左右地侵沒為花圃為蔬畦藩籬兩逼餘一道僅通蘭若其間斷碑殘石埋沒荒蕪前後五十餘年在籍土田移去者什之八九鍾公庚陽來守是邦歲維丁丑始一過輒慨然思尋起墜緒延僧德乘與圖時五臺陸公光祖捐俸金一十二兩而古竹院舊址復仍捐金二十兩合餘𦔳俸資十兩而蓮池書屋並復得府縣捐俸資而池上蓮亭建金壇于公業𦔳資而古竹院祠堂建王公肻堂捐資而米公祠重建于公玉立捐資而玄素法堂建郡守吳公撝謙捐俸金勒法照禪師塔銘于石而碑亭建嘉禾錢君與映捐資而香花橋建兼以僧明賢輩以募緣𦔳而天王殿方丈廊廚靜室次苐建大鶴林賜田優免額皆與三山埒三山古剎鶴林亦古剎三山稱古蹟鶴林亦稱古蹟第三山居要衝冠蓋往來得不廢而鶴林地僻徑紆顯者履不時及廢故易夫廢則已矣今業已兆興忍不與三山一例視原田山除有力去籍外不可考餘緣之告入公莊者視籍灼灼在覩于是按其數歸之田一頃肆拾肆畝二分肆厘地柒拾一畝捌分柒厘荒白地伍拾伍畝捌分山伍頃一拾陸畝肆分給帖復差令不失為鶴林故物然以方完業不及遠甚事付之無可誰何而已甲午夏余南遷明賢輩來白始知寺田二拾餘畝猶為土官汪氏所據邑尹龎君時雍竟判屬焉以續成余志余因具述寺所繇興衰顛末謹授龎君鐫于石以寄不朽且以望後之當寺者惜古剎名踪景高賢懿躅延石淙公遺愛成五臺公盛舉則厥寺也庶永終乎母聼二三豪強規目前尺寸以致千年勝趾湮滅無稽而屑越之也則幸矣刑科左給事中前知丹徒縣事馬邦良撰鶴林寺畫祖師像記陶望齡電至疾雲至變也而人能狀之水之霔凸火之光焰善繪者至以擅名皆相也天下之必不可畫者唯天唯風然草樹之梢偃波濤之飛立特寫其摧靡澎湃之態而風狀得矣星纒日道羅絡經緯明之以雲霞晦之以氛霧而天象具矣然則天與風亦未嘗不可繪也如來三十二相即為非相志公一靣而現觀音十二靣見者如狀風擬者如圖天况紙墨所能摹邈哉然非相一相多而三十二又多而八十種好萬毛孔灮明非靣正靣多而十有二又多而千手千眼而八萬四千爍迦羅首母陀羅臂清淨寶目如草樹之一葉一縷如星之一纒一次非天非風而天風宛然笵金刻木土塑紙描一一相好一一莊嚴皆非相皆正靣皆真佛真祖也嗚呼像教陵夷古宿道場草深一丈經遊者欲瞻仰遺像而不可得僧徒惰窳恬不知怪久矣京口鶴林寺僧名明賢者乃能具此一大因緣精繪善裝歷世前後歷土東西諸聖比肩如語如笑又懼其久而莫守也謁余言以永之豈非奇特最勝事乎繪本出白下祖堂裒而聚之者為達觀禪師今繪工之施資者陳如寶等為軸七十有四諸佛無相諸祖無相繪者無相施者無相作是因緣者無相記者亦無相濂溪先生祠記徐大用嘗疑先生去孔子千四百年六經割裂師友源淵蔑如矣然卒聞其道所言行事不疑于孔子楊雄王通韓愈之徒皆負一世之才極思慮之致如嘗合水于江河其孰能以津為海而先生太極一圖直遡河洛為萬世言道者準天授非力人耶及觀孔子不得中行而與之必也狂狷乎孟軻氏謂其古之人古之人夷考其行而不掩者孟軻氏之言非耶至聞明道再見先生吟風美月以歸先生常令尋孔顏樂處乃豁然知先生所以聞道孔子孟軻氏豈欺我哉朝氣清莫氣歸七日止必有與天地通者矣天地一日百生人萬生物道何晦之與有禮樂于周六經於孔子火于秦訓詁于漢猶百尺之波振落于大海陰晝亡日者等見耳號物之數謂之萬物之則一天地萬物吾心一物也未有一物而是物非物自岐自合分榮分瘁分多分鮮分存分亡者毛嬙西施生而不知其美也人謂之而後知其美此以人之謂為見也其不知者全也何以間于里之婦哉是一物之說也放之天地而不禦馳八極而不疾入于金石之中而不窒孺子入井于我怵惕仁也雖有忮心不怨飄瓦義也西施生而不愛誠也是心之謂也故泰山崩于前麋鹿興于左而息不止左州右夏謔浪醉頺夢晚而傳此堯桀之所同豈移于外物哉夫惟先生胸次灑然天地之表百情隨太虛而感變其出也蕩蕩若流水止也輝輝如過雲之日孔顏之樂所繇與光風霽月者為旦暮耶夫權臣之威至於流血千里冠冕白族皆主之靈也則借之而以自亡五情之變至於桀跖皆心之材也心則授之而以自牿即使反權臣之靈而以露群生豈有既哉故主能借之亦能攬之心能授之亦能返之心權物則制情情權物則制心千四百年之間無先生其心者耶無以心權者也無以心權者彼不知吾心而之情者也此先生所教尋孔顏樂處而與觀于吾心之氣象也吾郡太守王公令君龎公既皆慕先生之風而按志故有先生祠鴻鶴山下蓋先生嘗奉母依舅氏鄭龍圖居潤母卒遂葬焉讀書山下鶴林寺之側故即其地祠之後或廢或徙儒學或遷主文廟介在儒學者有亭曰光風霽月尋圮祠或廢為游踐之地王公慨然曰先生之教即所在無不風人若其讀書之地未有不過而思者也于是乃創修之復祠先生其中以和靖尹先生配享和靖亦過潤葬其妻家焉者也然是有堂三楹耳龎公乃度陸公廢祠木石悉鍰羡鑿池周以石欄池之前復建光霽亭環墻內外植桂桐梅柳數百本門外開徑有踐松柏徑折而東達寺為坊曰周子蓮池又東為東坡竹院坊相望云經其處宮墻之間鬱然登其亭虗敝納群岫入拜祠下徘徊池上庶幾見先生既落而碑豫記之豫二公察舉士乃為道先生所以得與于千四百年之下而以告夫過先生之祠者重建濂溪祠并祭田碑記王應麟先生讀書鶴林寺後之人即其地祀之祠圮當事者遷主文廟之東清風祠舊祠遂為遊人踏踐蓮池亦漸淤塞且業于土人矣己丑春五臺陸公贖焉于是檄丹徒龎君時雍復之以尹和靖曾寓居京口配焉深濬其池四靣石砌環之以欄池前建光霽亭圍垣內外植桃李桐桂諸木宛然庭草交翠祠逶東闢徑通寺竪周子蓮池坊與蘇公竹院坊相對以妖僧汪元洪藉沒田百餘畝向隱占者供歲祭貯其餘以佐修繕周先生曰菊之愛陶後無聞蓮之愛同豫者何人額其亭曰同豫鶴林別業白龍岡記釋明賢白龍岡在潤州西南最高峰下去鴻鶴獸窟五六里而近有泉發源深谷瀉於兩山之間潺湲清徹可鑑毛髮掬而飲其味溫泉上有岩岩中石室即新闢洞也洞前叠巘凌霄如列戟然意其上必有幽絶處人所不及知者余欲結茅其中以了幽棲之願而未能也今萬曆庚戌春日摳衣岩行歷黃峴諸𡶶過九招隱作南山竟日之遊再憩白龍岡日脯矣但見牛羊下山游雲蕩胸其景蔚然深秀真為道人息心之地遂兀坐終夜萬籟無聲歌沈佺期頓令心地欲皈依之句良快僧某為余言方開山出土才深四五尺有龍骨星散土石間又有滴乳石其色瑩然則知此中自龍解後骨化幾千年矣且石根虗懸狀若覆釜隨高隨下漸開漸大周覽立壁霔者凸者卷空而突出者左右相環抱者前起兩三怪石當洞門如屏如嶂可梯可坐嗟乎奇矣豈山霛𢌿石室與老衲安禪耶或假神斧于僧手祕之千載而闡之一朝耶然循岩左折而上石磴百餘級則峭璧插空礧磈殊絶從人指處曰石骨天池登龍山絶頂佇目大江見嵐霧鎖山練灮如帶余時兩袖翩翩若御風矣復緣鳥道右折而下度還雲嶺明月溪出松陰隱隱一小山如卧獅狀嶷然踞洞口山頭結一草標曰卧獅庵即鶴林別業也門外奇𡶶青嶂與村疇雲樹各相映帶翹首遠望五州屹峙于前回龍環拱于後其中層巒復道石浪千盤澗壑幽深碧雲滿地又何羡廬嶽浮羅牛山鴈宕耶使道人觀空悟性了大因緣于此其亦幸也夫鶴林寺合堂記淡髮僧淨居講寺無榮無辱無緣無染以目觀鼻以鼻觀心作如是觀爾時古竹比丘賢長者子手持戒珠披衣足踏茲地稽手訊豫而言賢古竹法眷家世毗陵髫齔皈依從無始生死以來願入三摩鉢提念是淨梵舊有飰僧土田山場殿宇僧寮若干於時寺衆渾然一體痛癢呵護如手足之捍頭目無有言說嗣後歲月彌遠各𥝠其我各懷其有甚至甲乙齮齕嫉人利己因而膏腴析入世闠賴有夙因菩薩化為宰官現冡宰身不愛𩬊膚亟返土田兼收籍沒新畬充祀先賢無何復有𥝠匿肥己者如彼善博日勝日負自云是巧不知自拙不明性地出入𥝠利如彼耳目口鼻各司一竅無有統攝大蠧圓教認苦海為福田投坑塹為彼岸出力拔救沉溺彌深反致橫口相加捶打不忍不獲已鳴之人天父母苦惱悲惋彰明其罪而後已於是諸長者子等不一人悔作尤念願還所有合歸主持凡一粒一絲合為一堂名曰合堂欲祈是說勒之貞珉以永其傳俾後住茲行持統是印證無有差別淡𩬊僧曰善哉希有爾作是說功德無量無以一切世間榮辱緣染為問而念祗舍大衆比丘失足汗漫恆河令歸淨名惟是究竟是大根因是大識量當想人性佛性只一不二匪但劫習起滅即汝一身元無有分何以有合既以有合何從有分分以分合合以合分無分無合分合既無始歸於一若人色聲香味以耳目口鼻故具觀聼嗅嘗無有形現無有出入無有是非統一性靈苞孕森羅三千大千以及微塵剎土無不照也無不聞也無不通也而本性圓圓陀陀是為如來是為妙覺如一切生老病死苦諸業不染不著以無分故而護此一身如是一家亦如是今諸長者子還念如初自無內疚外眚曷侵永歸堅固是為大菩薩大修行金剛不壞歷劫不毁其一切覆規叛教之徒祗迷謬目墮出悆愈滯去佛愈遠如餓犬饑鷹攫食不得氣息奄盡終無益已我願爾古竹祗舍從茲悔怨合堂以來人有爾我心無內外若耳目口鼻四肢百骸悉統一心無人相無我相是為完人是為真佛子於是諸長者子歡喜信受而說偈言偈曰人從四大生四大惟一理一理不究竟四大為何物如彼大莊嚴衆寶原散亂不經神妙手獨寶不成名即是爾祗陀衆等成法界必歸一真如然後能不毁世業既一己妄念自不生有一而無妄是為菩提果設起爾冡宰及爾祖比丘見我淡𩬊僧呼喏應不後之繼今者悉奉如是法合即為佛子分即為魔道護法有神威滅邪伏靈杵起手成虀粉萬劫墮阿鼻鶴林寺志序賀鶴林素心常上人住持敘龎時雍今上昭陽大荒落之歲余為丹徒丹徒蓋衝邑供餼騷繹簿書旁午以余簡淡之性間出登臨如黃鶴獸窟金焦北固群巒繡錯清江環繞蕩中滌日藉以豁其囂塵之絫若鶴林為馬素禪師道場左子瞻竹院李涉偷得浮生半日閒之句在焉右則茂叔蓮池十三松有賦有記有銘人所艷說而殷七七杜鵑臺有仙蹟臺雖廢而碑與志可考已傳宋至元間明法華菩薩顯其神力以三日夜雨祛旱魃歷稽祖之系派與山之森秀鶴林最哉中有僧履中舊以名德為郡守龍溪王公推視僧綱司篆彼其所持似與世之所謂僧者異余遇之亦不與凡僧倫也及與究談名理即五千塞胸祕妙哆口余益嚴重之無何辭去篆事携其徒真常來請藏志固不細會妖人難作不得請師弟以諳通經律傳食諸剎乃淨名卓行因寢寢聞公卿間常上人才茂齡竟以宿德與選遂劄充鶴林寺冠帶住持俾督率僧寮永遠焚修共勵今鞠月告盡恐此北地早寒膠其舟而常上人遽辭余還京口也余因其行追序往事為文內之橐中令其歸而藏之名山抑亦攬余文而興起以相續諸祖垂滅之燈焰也鶴林履中上人詩序余既序履中上方集卒業上方集續已所許可見前序中其續矣而未及見見矣而未之序者則復拈取一二以為雜言今成書具在履中之有聲天下豈必以豫言哉而豫則有意履中如是是故天下之知有履中也以履中也不盡以其詩也天下之知有履中之詩也以履中之詩也不盡以豫言也乃豫知有履中則以履中之詩矣顧履中腳底甚濶眼界甚寬遊道即不甚廣乎而不可謂不廣十載以來甌越括蒼以後北燕中豫南蘄黃又南虔州廋嶺足跡幾遍所知交多聞人名士而詩亦稱是今年夏五儼然見造殷勤道故已即稱詩夫豫自客歲悼亡擾擾萬緒不復知聲偶為何物乃履中慓鋭迅疾橫以挑豫豫不得已迫而應之成詩一二多不成語而履中復彙後先諸稿俾豫為序豫聊為點定大都以應遠暇引皎然靈一清江法振處默廣宣貫休齊已之數公者傳世之語豈必在多哉精騎五千可當卒百萬兵不貴多夫詩亦若是已履中其謂豫何何時聚糧襆被重覔履中於磨笄大峴之間與履中頭顱相觸筆鋒相競一句之奇相賞一字之訛相戡雌黃甲乙竄易丹鉛互相加遺以續十餘年前一假佳事乎庶幾天下後世知有鶴林則不獨知有馬祖之塔寄奴之泉殷七七之杜鵑李博士蘇端明米南宮之遺蹟而知有履中矣知有履中則知有履中之詩知有履中之詩則知有今時文字之交如冒生者已丁未六月望日廣陵社弟冒愈昌撰鶴林寺志疏文修鶴林寺疏陳其志世傳鹿苑有山神常護法幢寺號鶴林無石梁隔分凡境自昔莊嚴淨域至今熏習名區一道碧潺湲尚憶菴棲海嶽千尋金瑣碎仍餘門掩琅玕有時過客題詩山門繫馬竟日高人看竹方丈留鶯竪起拂鐵甕一丸放下鍬金焦點要識西來祖意暮潮邊帆影高低欲知首坐禪心煙樹外鍾聲遠近粥魚茶板分禪誦以成群寶月金雲續香燈于永夕非不林雕樾繪其如雨剝霜摧高榜仄而鳥啄罘罳殘碑卧而苔侵負贔賔頭盧委墻破墮戒慱迦倚杖支離謾誇繚繞紺園越世久踏成樵客路遮莫崔巍碧殿數年來址作野人居欲令蘭若中興爰有明賢上足逸群聲價誰云雪浪橫枝本色鉗鎚却是雲門滴泒白牯牛騎來露地赤班蛇竄出驚人推倒回頭踢翻不托只當逢場作戲九𡶶拽耙楊岐牽犂不妨到處隨緣尋常貶剝諸方箭鋒機句中有眼造次受敵八靣本字詩筆下無痕然雖衲子生涯曾被宰官物色正使旃林再闢必藉檀越同心布施聰名善因王公士庶莫教空入寶山錢刀大都長物銖兩百千隨分捨來香界即捐大海之數滴亦是檀波但分上林之一枝莫非春色鶴林寺志說鶴林寺興廢緣起說釋法先京口南里許鴻鶴山下磨笄山側有寺為鶴林創自晉大興間名古竹院即唐李涉題逢僧話處也宋武帝微時枕扁擔于此時鴻鶴百群張翼蔽日相人曰此人它日當為王後即位賜額鶴林錫之土田百頃又鑿井曰寄奴泉至唐馬祖玄素師大開禪席四方宗嚮悟道者不可指數入滅後左補闕李撰塔銘諡大津法照禪師板刻于宋咸淳今石尚存中有杜鵑花枝蚪曲柈九叠二姬出沒花下人倣佛見之號護花神女殷七七借開後後竟亡花有臺如廣陵瓊花臺瓊花臺尚存杜鵑臺則廢已馬祖說法時感天雨有匾為索靖書曰天雨寶骨力徑麗若龍跳鸞停致足珍也上足法欽禪師剃度于是祖曰此非汝所乘流而行遇徑則止后入徑山龍神引至五𡶶之間築潭為基遂開山鳥窠嗣之法鏡則倡道于吳門夾山則衍諦干閩水牛頭法嗣最勝一唯鶴林所秀出哉宋有壽涯大師與濂溪先生善授以太極圖說契之因鑿池寺旁為愛蓮池結屋池上顏曰讀書處米襄陽兩尊人客死潤州瘞寺左鴻鶴山麓時為廬墓父子與寺僧聰禪師交相契甚晨夕還往元章每謂曰有心護法此中師曰亡戲言元章曰它日我死寺中鼓鍾自鳴即神來矣將化語子曰鶴林緣熟我神將棲之師設祠而𨒖梵樂皆自響如其言米友仁手書當山護伽藍神御史銀青米公神位至今顯霛焉元章自繪像友仁之贊在石高宗南渡入寺勒七碑立七像御書七佛偈上有璽今峩焉存其三四為烏有矣大中祥符間賜寺田地共一百二十頃鴻鶴招隱黃峴等山八十頃有奇入國朝來正殿基為有力者占為塋弘治間了心師重修嘉隆間竹院蓮池亦据于豪右萬曆初陸太宰五臺先生謂鍾郡守西星曰此鶴林歷代祖庭亡泛視之乞延大德僧以振前烈于是延一宗師為住持贖還竹院蓮池未幾入寂徒孫明賢嗣之于是郡守臨川吳公蠲俸葺修門扃廊廡粲然輝映龍溪王公則斷復祭田百餘畝入濂溪祠汶上龎公砌池衛以石闌造光風霽月亭晉安許公則重遷陸秀夫祠于竹院前有飾而新焉山場田地以賢極力恢復然僅僅三百畝耳校昔萬畝至眇鮮已不意賢瓢笠游參數年來歸復見古寺翻為草莽則知天運密移世態匪固皆付之於成住壞空嗟乎物有興衰時有隆㫺廢則廢矣必有時而興因紀其顛末刻諸石庶後之觀覽者有所考云鶴林寺志詩唐竹林寺李嶠早起出城市尋僧到竹林始知竹林幽僧棲雲自深題鶴林寺綦母潛道門隱形勝向背臨層霄松覆山殿冷花藏溪路遙珊珊寶幡挂焰焰明燈燒遲日半空谷春風連上潮少憑水木興暫忝身心調願謝携手客茲山禪誦饒鶴林寺崇上人山亭儲光羲清旦歷香岩山徑紆復直花林開宿霧游日清霄極分明窗戶中遠近山川色金沙童子戲香飯諸天食呌呌海鷗聲軒軒江燕翼寄言清淨者閭閻徒自踣寄江南鶴林寺